# Runs the shared YINI conformance test suite against this TypeScript parser.
# The workflow checks out both repositories, builds the parser and adapter,
# installs the Python test runner from source, and executes all lenient and
# strict conformance cases through the Node.js adapter.

name: YINI Test Suite

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    yini-test-suite:
        name: Run shared YINI test suite
        runs-on: ubuntu-latest

        steps:
            - name: Check out yini-parser-typescript
              uses: actions/checkout@v7
              with:
                  path: yini-parser-typescript

            - name: Check out yini-test-suite
              uses: actions/checkout@v7
              with:
                  repository: YINI-lang/yini-test-suite
                  # Optional pin. Uncomment once yini-test-suite has a release tag.
                  # ref: v0.3.0
                  path: yini-test-suite

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: yini-parser-typescript/package-lock.json

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install TypeScript parser dependencies
              working-directory: yini-parser-typescript
              run: npm ci

            - name: Build TypeScript parser
              working-directory: yini-parser-typescript
              run: npm run build

            - name: Build TypeScript yini-test adapter
              working-directory: yini-parser-typescript
              run: npm run build-tools

            - name: Install yini-test-suite from GitHub checkout
              working-directory: yini-test-suite
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e .

            - name: Run yini-test-suite against TypeScript parser
              working-directory: yini-parser-typescript
              run: >
                  python -m yini_test all
                  --all-modes
                  --cases-root ../yini-test-suite/src/yini_test/cases
                  --adapter node ./dist-tools/tools/yini-test-adapter.js --input {input} --mode {mode}
