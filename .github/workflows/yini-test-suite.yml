# Runs the shared YINI conformance test suite against this TypeScript parser.
# The workflow builds the parser and adapter, installs the latest published
# Python test runner from PyPI, and executes all bundled lenient and strict
# conformance cases through the Node.js adapter.

name: YINI Test Suite

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    yini-test-suite:
        name: Run shared YINI test suite
        runs-on: ubuntu-latest

        steps:
            - name: Check out yini-parser-typescript
              uses: actions/checkout@v7
              with:
                  path: yini-parser-typescript

            # The published yini-test-suite package includes the shared case
            # corpus, so the separate source checkout is no longer needed.
            # - name: Check out yini-test-suite
            #   uses: actions/checkout@v7
            #   with:
            #       repository: YINI-lang/yini-test-suite
            #       # Optional pin. Uncomment once yini-test-suite has a release tag.
            #       # ref: v0.3.0
            #       path: yini-test-suite

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: yini-parser-typescript/package-lock.json

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install TypeScript parser dependencies
              working-directory: yini-parser-typescript
              run: npm ci

            - name: Build TypeScript parser
              working-directory: yini-parser-typescript
              run: npm run build

            - name: Build TypeScript yini-test adapter
              working-directory: yini-parser-typescript
              run: npm run build-tools

            - name: Install latest published yini-test-suite
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install --upgrade --pre yini-test-suite

            - name: Run yini-test-suite against TypeScript parser
              working-directory: yini-parser-typescript
              # The PyPI package uses its bundled cases by default, so the old
              # source-checkout path is no longer needed:
              # --cases-root ../yini-test-suite/src/yini_test/cases
              run: >
                  yini-test-suite all
                  --all-modes
                  --adapter node ./dist-tools/tools/yini-test-adapter.js --input '{input}' --mode '{mode}'
